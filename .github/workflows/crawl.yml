name: Scheduled Crawl

on:
  schedule:
    # UTC 時間（台灣 UTC+8）：07:00, 11:00, 15:00, 19:00, 23:00
    # UTC times (Taiwan UTC+8): 07:00, 11:00, 15:00, 19:00, 23:00
    - cron: '5 23 * * *'
    - cron: '5 3 * * *'
    - cron: '5 7 * * *'
    - cron: '5 11 * * *'
    - cron: '5 15 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Crawl mode'
        required: true
        default: 'MAIN'
        type: choice
        options:
          - MAIN
          - ALL

# 確保同時間只有一個 crawl 在執行，避免 push 衝突
# Ensure only one crawl runs at a time to prevent push conflicts
concurrency:
  group: crawl
  cancel-in-progress: false

# 授予寫入權限，讓 bot 可以 push commit
# Grant write permission so the bot can push commits
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Taipei
  # 哪些 UTC 小時的排程要跑 ALL 模式（其餘排程跑 MAIN）。對應 TW 07/15/23
  # UTC hours whose scheduled run uses ALL mode (others use MAIN). Maps to TW 07/15/23
  ALL_UTC_HOURS: '23 7 15'

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Determine crawl mode
        id: mode
        run: |
          # 決定 LABEL：手動觸發用使用者選擇的；排程觸發比對 ALL_UTC_HOURS 集合
          # Decide LABEL: manual uses user input; scheduled checks cron hour against ALL_UTC_HOURS
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LABEL="${{ inputs.mode }}"
          else
            HOUR=$(echo "${{ github.event.schedule }}" | awk '{print $2}')
            if [[ " $ALL_UTC_HOURS " == *" $HOUR "* ]]; then
              LABEL="ALL"
            else
              LABEL="MAIN"
            fi
          fi
          [ "$LABEL" = "ALL" ] && FLAG="--all" || FLAG=""
          echo "flag=$FLAG" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Run crawler
        run: uv run python main.py crawl ${{ steps.mode.outputs.flag }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ docs/crawl_history.json
          # 排程時間 + 實際執行時間 / Scheduled time + actual execution time
          SCHEDULED="${{ github.event.schedule }}"
          ACTUAL=$(date '+%Y-%m-%d %H:%M')
          if [ -n "$SCHEDULED" ]; then
            # 從 cron 取 UTC 時分，轉換為台灣時間 / Extract UTC HH:MM from cron, convert to Taiwan time
            CRON_MIN=$(echo "$SCHEDULED" | awk '{print $1}')
            CRON_HOUR=$(echo "$SCHEDULED" | awk '{print $2}')
            TW_HOUR=$(( (CRON_HOUR + 8) % 24 ))
            CRON_TW=$(printf "%02d:%02d" "$TW_HOUR" "$CRON_MIN")
            MSG="crawl: (cron ${CRON_TW}) ${ACTUAL} ${{ steps.mode.outputs.label }}"
          else
            MSG="crawl: ${ACTUAL} ${{ steps.mode.outputs.label }}"
          fi
          git diff --cached --quiet || git commit -m "$MSG"
          git push